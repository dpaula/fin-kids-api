databaseChangeLog:
  - changeSet:
      id: 004-add-audit-events
      author: codex
      changes:
        - createTable:
            tableName: audit_events
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: account_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: actor_user_id
                  type: BIGINT
              - column:
                  name: actor_email
                  type: VARCHAR(180)
                  constraints:
                    nullable: false
              - column:
                  name: actor_global_role
                  type: VARCHAR(20)
              - column:
                  name: action_type
                  type: VARCHAR(60)
                  constraints:
                    nullable: false
              - column:
                  name: resource_type
                  type: VARCHAR(40)
                  constraints:
                    nullable: false
              - column:
                  name: resource_id
                  type: BIGINT
              - column:
                  name: payload_summary
                  type: TEXT
              - column:
                  name: created_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: audit_events
            baseColumnNames: account_id
            referencedTableName: accounts
            referencedColumnNames: id
            constraintName: fk_audit_events_accounts

        - addForeignKeyConstraint:
            baseTableName: audit_events
            baseColumnNames: actor_user_id
            referencedTableName: app_users
            referencedColumnNames: id
            constraintName: fk_audit_events_actor_users

        - createIndex:
            indexName: idx_audit_events_account_created_at
            tableName: audit_events
            columns:
              - column:
                  name: account_id
              - column:
                  name: created_at

        - createIndex:
            indexName: idx_audit_events_actor_email_created_at
            tableName: audit_events
            columns:
              - column:
                  name: actor_email
              - column:
                  name: created_at

        - createIndex:
            indexName: idx_audit_events_action_type_created_at
            tableName: audit_events
            columns:
              - column:
                  name: action_type
              - column:
                  name: created_at
